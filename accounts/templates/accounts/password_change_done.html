{% extends "base.html" %}

        <div style="width: 80px; height: 80px; background: rgba(0, 255, 127, 0.1); border: 2px solid #00ff7f; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; color: #00ff7f;">
            <svg stroke="currentColor" fill="none" stroke-width="3" viewBox="0 0 24 24" height="3em" width="3em" xmlns="http://www.w3.org/2000/svg"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <a href="{% url 'accounts:profile' %}" class="btn btn-primary" style="padding: 14px 40px;">DASHBOARD-A GAÝT</a>
    </div>
</div>
{% endblock %}
